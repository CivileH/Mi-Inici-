<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página de Inicio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
    }
    h1 {
      margin: 0;
      color: white;
    }
    .search-box {
      margin: 30px auto;
      max-width: 500px;
    }
    input[type="text"] {
      width: 80%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background-color: #333;
      color: white;
      cursor: pointer;
    }
    .links {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .links a {
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.3);
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .links a:hover {
      background: rgba(0,0,0,0.6);
    }
    .widget {
      margin: 40px auto;
      max-width: 800px;
    }
    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bienvenido a tu Navegador</h1>
  </header>
  
  <div class="search-box">
    <form action="https://www.bing.com/search" method="get">
      <input type="text" name="q" placeholder="Buscar en la web...">
      <button type="submit">Buscar</button>
    </form>
  </div>
  
  <div class="links">
    <a href="https://www.youtube.com">YouTube</a>
    <a href="https://www.facebook.com">Facebook</a>
    <a href="https://www.twitter.com">Twitter</a>
    <a href="https://www.microsoft.com">Microsoft</a>
  </div>

  <div class="widget">
    <h2>Noticias de Alfredo Jalife</h2>
    <!-- Blog oficial -->
    <iframe src="https://alfredojalife.com"></iframe>
    <!-- Canal de YouTube -->
    <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=AlfredoJalifeR"></iframe>
  </div>
</body>
</html>
